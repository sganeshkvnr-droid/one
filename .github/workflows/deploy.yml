name: Production CI Pipeline

# 1. The Trigger: When should this pipeline run?
on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

# 2. The Machine: What computer should run this?
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 3. The Steps: What exactly should the machine do?
    steps:
    # Step A: Download your code onto the GitHub server
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step B: Install the environment (Node.js)
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    # Step C: Install your project's dependencies
    - name: Install Packages
      run: npm install

    # Step D: Run your automated tests (if you have them)
    - name: Run Tests
      run: npm test

    # Step E: Build the final application
    - name: Build Project
      run: npm run build